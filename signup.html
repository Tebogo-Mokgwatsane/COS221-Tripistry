<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripistry - Create your account</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form class="container" id="form">
        <div class="switch">
            <div class="slider" id="slider"></div>
            <button type="button" class="tab active">
                <img src="img/icons/plane-black.svg" alt="plane" class="icon" id="black-plane">
                <img src="img/icons/plane-gray.svg" alt="plane" class="icon" id="gray-plane">
                <p>Traveller</p>
            </button>
            <button type="button" class="tab">
                <img src="img/icons/briefcase-black.svg" alt="plane" class="icon" id="black-brief">
                <img src="img/icons/briefcase-gray.svg" alt="plane" class="icon" id="gray-brief">
                <p>Agency</p>
            </button>
        </div>
        <div class="traveller" id="traveller-form">
            <div class="descr">
                <h1>Create your account</h1>
                <p>Start booking your next trip in minutes.</p>
            </div>
            <div class="name">
                <div class="field">
                    <label for="fname">FULL NAME</label>
                    <input type="text" required name="fname" id="fname" placeholder="John">
                </div>
                <div class="field">
                    <label for="lanme">LAST NAME</label>
                    <input type="text" required name="lname" id="lname" placeholder="Doe">
                </div>
            </div>
            <p class="error" id="fname-error"></p>
            <div class="field">
                <label for="email">EMAIL</label>
                <input type="email" required name="email" id="email" placeholder="email@example.com">
                <p class="error" id="email-error"></p>
            </div>
            <div class="field">
                <label for="password">PASSWORD</label>
                <input type="password" required name="password" id="password" placeholder="••••••••">
                <p class="error" id="password-error"></p>
            </div>
        </div>
        <div class="agency" id="agency-form">
            <div class="descr">
                <h1>Create an agency account</h1>
                <p>It takes about a minute</p>
            </div>
            <div class="field">
                <label for="agency-name">AGENCY NAME</label>
                <input type="text" required name="agency-name" id="agency-name" placeholder="Tripistry Holidays">
                <p class="error" id="agency-name-error"></p>
            </div>
            <div class="field">
                <label for="agency-email">EMAIL</label>
                <input type="email" required name="agency-email" id="agency-email" placeholder="company@example.com">
                <p class="error" id="agency-email-error"></p>
            </div>
            <div class="field">
                <label for="agency-password">PASSWORD</label>
                <input type="password" required name="agency-password" id="agency-password" placeholder="••••••••">
                <p class="error" id="agency-password-error"></p>
            </div>
            <div class="field">
                <label for="registration-num">BUSINESS REGISTRATION #</label>
                <input type="text" required name="registration-num" id="registration-num" placeholder="123456789">
                <p class="error" id="registration-num-error"></p>
            </div>
        </div>
        <button type="submit" class="signin-btn">
            <p>Create your account</p>
            <img src="img/icons/arrow-right-black.svg" alt="arrow-right" class="icon">
        </button>
        <div class="instead">
            <p>Already have an account?</p>
            <a href="login.html">Sign in</a>
        </div>
    </form>
    <script src="scripts/signup.js"></script>
</body>
</html>
