<!DOCTYPE html>
<html>
    <head>
        <title>Tripistry</title>
        <link rel="stylesheet" href="../css/Booking.css">
    </head>
    <body>
        <h1><big>Package Booking</big></h1>
        <div class="package details">
            <p id="title">Loading package...</p>
            <img id="packageImage" src="" alt="Package image" width="250" height="180">
            <p id="description">Loading description...</p>
        </div>
        <br><br>
        <div>
            <form class="form">
                <input type="hidden" id="package_id" value="1">

                <h2><small>Booking Details</small></h2>
                <div class="form-group">   
                    <label for="quantity">Number of Packages / Travellers:</label>
                    <input type="number" id="quantity" min="0" value="1" required>
                </div>
                <br>
                <div class="form-group">
                    <label for="notes">Special Requests</label>
                    <input id="notes" type="text" placeholder="Any special request?">
                </div>
                <div>
                    <p><strong>Total Price:</strong>R<span id="totalPrice">2000</span></p>
                </div>
                <button type="submit">Confirm Booking</button>
            </form>
            <p id="response"></p>
            <div id="paymentLink" class="payment-link">
                <a href="payment.html"><button>Proceed to Payment</button></a>
            </div>
            <a href="/traveller/index.php"><button>Cancel</button></a>
        </div>
    </body>
    <script src="../scripts/booking.js"></script>
</html>
