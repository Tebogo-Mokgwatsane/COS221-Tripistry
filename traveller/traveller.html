<body>
    <?php include("../navbar.php"); ?>

    <div class="container" style="margin-top: 100px;">
        <h1>Testing Traveller Search✈️</h1>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search destinations, packages, attractions... (e.g. Cape Town, Safari, Beach)">
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        let timeout = null;

        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(timeout);
            const query = this.value.trim();

            if (query.length < 2) {
                document.getElementById('results').innerHTML = '';
                return;
            }

            timeout = setTimeout(() => performSearch(query), 500); // Real-time with 500ms debounce
        });

        function performSearch(query) {
            fetch('../api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: "Search",
                    query: query
                })
            })
            .then(res => res.json())
            /*.then(res => {//debugging
            return res.text().then(text => {
                try {
                    return JSON.parse(text);
                } catch (err) {
                    console.error("The raw server login response was:", text);
                    throw new Error("Server did not return valid JSON");
                }
            });
            })*/
            .then(data => {
                if (data.status === "success") {
                    renderResults(data.data.packages);
                }
            })
            .catch(err => console.error(err));
        }

        function renderResults(packages) {
            const container = document.getElementById('results');
            if (packages.length === 0) {
                container.innerHTML = "<p>No results found.</p>";
                return;
            }

            let html = `<h2>Found ${packages.length} packages</h2>`;
            packages.forEach(pkg => {
                html += `
                    <div class="package-card">
                        <h3>${pkg.title}</h3>
                        <p><strong>Package Description:</strong> ${pkg.package_description || 'N/A'}</p>
                        <p><strong>Destination:</strong> ${pkg.city}, ${pkg.country}</p>
                        <p><strong>Price:</strong> R${parseFloat(pkg.price).toFixed(2)}</p>
                        <p><strong>Destination Description:</strong> ${pkg.destination_description || 'N/A'}</p>
                        <p><strong>Attraction:</strong> ${pkg.attraction_name || 'N/A'}</p>
                        <p><strong>Attraction Description:</strong> ${pkg.attraction_description || 'N/A'}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
